# Render Blueprint — auto-configures the service on render.com
services:
  - type: web
    name: clubconnect-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT
        value: 100/minute
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
    plan: free
